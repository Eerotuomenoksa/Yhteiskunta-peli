<script>
  // Kevyt localStorage-pohjainen korvike Claude-artefaktien window.storage-rajapinnalle,
  // jotta tulostaulu toimii myös tässä itsenäisessä HTML-tiedostossa.
  // Huom: tämä on VAIN tämän selaimen paikallinen tallennus, ei oikeasti jaettu muiden pelaajien kesken.
  (function () {
    const PREFIX = "yhteiskunta:";
    window.storage = {
      get: async (key) => {
        const raw = localStorage.getItem(PREFIX + key);
        if (raw === null) throw new Error("not found");
        return { key, value: raw, shared: false };
      },
      set: async (key, value) => {
        localStorage.setItem(PREFIX + key, value);
        return { key, value, shared: false };
      },
      delete: async (key) => {
        localStorage.removeItem(PREFIX + key);
        return { key, deleted: true, shared: false };
      },
      list: async (prefix) => {
        const keys = Object.keys(localStorage)
          .filter((k) => k.startsWith(PREFIX + (prefix || "")))
          .map((k) => k.slice(PREFIX.length));
        return { keys, shared: false };
      },
    };
  })();
</script>

// Yhdistää sivilisaation, (mahdollisen) ostetun kansallisvaltion ja pelaajan valitsemien aloitustaitojen
// bonukset — health on additiivinen, muut kertoimia.
function combinedMods(civ, nation, skills) {
  const base = civMods(civ);
  const out = { ...base };
  const applyMods = (mods) => {
    if (!mods) return;
    for (const k of Object.keys(mods)) {
      out[k] = k === "health" ? (out.health ?? 0) + mods.health : (out[k] ?? 1) * mods[k];
    }
  };
  applyMods(nation?.extraMods);
  (skills ?? []).forEach((skKey) => applyMods(startingSkillByKey(skKey)?.mods));
  return out;
}

function govUnlocked(g, eraIdx, derived) {

  if (g.reqEdu && derived.eduCov < g.reqEdu) return false;
  if (g.reqAdmin && derived.adminCov < g.reqAdmin) return false;
  if (g.reqCohesion && derived.cohesion < g.reqCohesion) return false;

function govRequirementText(g) {
  const reqs = [];

  if (g.reqAdmin) reqs.push(`hallintokattavuus ≥ ${Math.round(g.reqAdmin * 100)} %`);
  if (g.reqCohesion) reqs.push(`yhteisöllisyys ≥ ${Math.round(g.reqCohesion * 100)} %`);

function pickEvent(extra) {
  const pool = extra && extra.length ? EVENTS.concat(extra) : EVENTS;
  const total = pool.reduce((s, e) => s + e.weight, 0);
  let r = Math.random() * total;
  for (const e of pool) { r -= e.weight; if (r <= 0) return e; }
  return pool[pool.length - 1];
}

      pollution: { name: "Pollution", infoTitle: "Pollution Index", infoText: "In reality, air pollution is measured via, e.g., particulate concentration (PM2.5), CO2 emissions per capita, and air quality indexes. Industrialization in the 1800s brought the first major emissions, and environmental awareness only began in the latter half of the 1900s. In the game the value rises with investment in industry and falls with research (cleaner technology). Lower is better.", unit: " idx" },
      gdpPerCapita: { name: "GDP / capita", infoTitle: "Gross Domestic Product per capita", infoText: "In reality, GDP is calculated three ways that in theory match: by production (value added), by income (wages + profits), or by expenditure (consumption + investment + exports − imports). National accounting was only formalized in the 1930s–40s (Simon Kuznets, Nobel 1971). In the game the figure is an abstract blend of output and technology, not a real currency.", unit: " units/person" },
      crimeRate: { name: "Crime Rate", infoTitle: "Crime Rate", infoText: "In reality, crime is measured as reported offenses per 100,000 inhabitants, but the statistic suffers from varying reporting thresholds across times and places. Systematic crime statistics and criminology as a discipline emerged with 1800s urbanization. In the game the value rises with weak administration and low cohesion. Lower is better.", unit: " /100,000" },
      happiness: { name: "Happiness Index", infoTitle: "Happiness Index", infoText: "In reality, e.g. the UN World Happiness Report is based on surveys where people rate their own life on a 0–10 scale, combined with explanatory factors like GDP, social support, and health. The report was first published in 2012. In the game the index combines health, cohesion, morale, wealth, and crime into a single 0–10 figure.", unit: " /10" },
    },

    facts: [
      "Before industrialization, 80–90% of the world's population worked in agriculture. Today, in rich countries, the share is under 2%.",
      "In England in 1381, about 78% of adult men worked in agriculture. By 1911 the share had fallen to 11%.",
      "The demographic transition means that as a society develops, mortality falls first and only later does fertility — in between, population grows rapidly. This happened in Finland in the 1800s–1900s.",
      "In pre-industrial societies, up to a quarter of children died within their first year of life, and nearly half before adulthood. That's why fertility was also high: 5–7 children per woman.",
      "In Finland's famine years of 1866–1868, an estimated 150,000–270,000 people died — about 8–9% of the population — one of the last great peacetime famines in Europe.",
      "Historian Arnold Toynbee classified 21–28 civilizations in world history. Oswald Spengler counted eight, Carroll Quigley 24 — there is no consensus on the definition.",
      "According to anthropologist Robin Dunbar, humans can maintain about 150 meaningful relationships. Larger communities need shared stories, religions, and institutions to stay cohesive.",
      "The dependency ratio tells you how many children and elderly there are per hundred working-age people. Finland's is among the weakest in Europe due to an aging population.",
      "The Black Death (1347–1351) is estimated to have killed 30–60% of Europe's population. The resulting labor shortage raised survivors' wages and broke down the feudal system.",
      "The Incas stored food in their qollqa storehouses for up to 3–7 years of need — state-level disaster preparedness was the backbone of the empire.",
      "The spread of the printing press from the 1450s onward halved the price of books and multiplied the speed information spread — it is considered one of the preconditions for industrialization.",
      "According to UN estimates, the world's population was about 8.2 billion in 2025. As recently as 1800 it was about one billion.",
      "Specialization requires a population base: a modern hospital with specialized departments needs a catchment of at least about 100,000–200,000 people to function efficiently.",
      "The Roman Empire's aqueducts brought hundreds of thousands of cubic meters of water into the city each day — clean water was antiquity's most effective 'healthcare system'.",
    ],

    metrics: {
      lifeExpectancy: { name: "Middellevetid", infoTitle: "Middellevetid", infoText: "I virkeligheden beregnes middellevetiden ud fra aldersspecifikke dødelighedstal med den såkaldte dødelighedstavle (life table) — det er ikke den gennemsnitlige dødsalder, men en statistisk prognose for, hvor længe en nyfødt ville leve med de nuværende dødelighedstal. I spillet udledes værdien af sundheds- og omsorgsdækning samt tidsalderens grundniveau.", unit: " år" },
      employmentRate: { name: "Beskæftigelsesgrad", infoTitle: "Beskæftigelsesgrad", infoText: "I virkeligheden er beskæftigelsesgraden andelen af beskæftigede blandt befolkningen i den arbejdsdygtige alder (fx bruger statistikbureauer typisk 15–64 år). Begrebet opstod først med lønarbejde og industrialisering i 1800-tallet — før da var 'arbejdsløshed' ikke et meningsfuldt statistisk begreb. I spillet afspejler værdien, hvor godt forvaltningen fungerer, og om kompetenceniveauet er tilstrækkeligt.", unit: "%" },
      pollution: { name: "Forurening", infoTitle: "Forureningsindeks", infoText: "I virkeligheden måles luftforurening bl.a. som partikelkoncentration (PM2,5), CO2-udledning per indbygger og luftkvalitetsindeks. Industrialiseringen i 1800-tallet bragte de første betydelige udledninger, og miljøbevidsthed startede først i anden halvdel af 1900-tallet. I spillet stiger værdien, når der investeres i industri, og falder med forskning (renere teknologi). Lavere er bedre.", unit: " idx" },
      gdpPerCapita: { name: "BNP / indbygger", infoTitle: "Bruttonationalprodukt per indbygger", infoText: "I virkeligheden beregnes BNP på tre måder, der i teorien stemmer overens: produktionsbaseret (værditilvækst), indkomstbaseret (løn + overskud) eller udgiftsbaseret (forbrug + investeringer + eksport − import). Nationalregnskabet blev først formaliseret i 1930'erne-40'erne (Simon Kuznets, Nobelpris 1971). I spillet er tallet en abstrakt kombination af produktion og teknologi, ikke en reel valuta.", unit: " enh./pers." },

// ============ KIELIVALINTA (i18n) ============
// Peli tukee useita kieliä. Suomi (fi) on perussisältö (ERAS, CIVS, EVENTS jne. yllä) ja toimii
// aina varajärjestelmänä (fallback), jos jokin merkkijono puuttuu käännöksestä. I18N sisältää
// muiden kielten käännökset samoilla avaimilla (key/id/indeksi) kuin perussisältö, ja UI_STRINGS
// kattaa kiinteän käyttöliittymätekstin (painikkeet, otsikot, työkaluvihjeet). T()/U()-apufunktiot
// hakevat käännöksen, tai palaavat suomenkieliseen versioon jos käännös puuttuu.
const LOCALES = ["fi", "en", "da"];
const LOCALE_NAMES = { fi: "Suomi", en: "English", da: "Dansk" };

function T(lang, table, key, field, fb) {
  return I18N[lang] && I18N[lang][table] && I18N[lang][table][key] && I18N[lang][table][key][field] !== undefined
    ? I18N[lang][table][key][field] : fb;
}
function TE(lang, eraIdx, field, fb) {
  return I18N[lang] && I18N[lang].eras && I18N[lang].eras[eraIdx] && I18N[lang].eras[eraIdx][field] !== undefined
    ? I18N[lang].eras[eraIdx][field] : fb;
}
function TRole(lang, eraIdx, roleKey, fb) {
  return I18N[lang] && I18N[lang].eras && I18N[lang].eras[eraIdx] && I18N[lang].eras[eraIdx].roles && I18N[lang].eras[eraIdx].roles[roleKey] !== undefined
    ? I18N[lang].eras[eraIdx].roles[roleKey] : fb;
}
function TInv(lang, eraIdx, idx, field, fb) {
  return I18N[lang] && I18N[lang].inventions && I18N[lang].inventions[eraIdx] && I18N[lang].inventions[eraIdx][idx] && I18N[lang].inventions[eraIdx][idx][field] !== undefined
    ? I18N[lang].inventions[eraIdx][idx][field] : fb;
}
function TFact(lang, idx, fb) {
  return I18N[lang] && I18N[lang].facts && I18N[lang].facts[idx] !== undefined ? I18N[lang].facts[idx] : fb;
}
function TVoice(lang, eraIdx, fb) {
  return I18N[lang] && I18N[lang].storyLabels && I18N[lang].storyLabels[eraIdx] !== undefined ? I18N[lang].storyLabels[eraIdx] : fb;
}
function U(lang, key) {
  const v = UI_STRINGS[lang] && UI_STRINGS[lang][key];
  return v !== undefined ? v : UI_STRINGS.fi[key];
}
function modLabel(lang, k, v) {
  const f = (I18N[lang] && I18N[lang].modLabels && I18N[lang].modLabels[k]) || MOD_LABELS[k];

const makeStart = (civ, villageName, startSkills, lang = "fi") => {
  const ST = STORY_TEXT[lang] || STORY_TEXT.fi;
  const civName = civ ? T(lang, "civs", civ.key, "name", civ.name) : null;
  const civTrait = civ ? T(lang, "civs", civ.key, "trait", civ.trait) : null;
  const civDesc = civ ? T(lang, "civs", civ.key, "desc", civ.desc) : null;
  const skillNames = (startSkills || []).map((k) => T(lang, "skills", k, "name", startingSkillByKey(k)?.name));
  const villageLabel = villageName ? ST.villageNamedLabel(villageName) : ST.communityLabel;
  return {
    civ,
    lang,
    villageName: villageName || "",
    startSkills: startSkills || [],
    year: 0,
    children: 2200, workers: 6300, elderly: 1500,
    foodStore: Math.round(5000 * combinedMods(civ, null, startSkills).store),
    era: 0, research: 0,
    alloc: { farm: 72, health: 3, edu: 3, industry: 8, research: 2, religion: 2, arts: 1, admin: 4, services: 5 },
    gov: "heimo",
    specialistShare: 0,
    healthFocus: 50,
    appliedShare: 0,
    nation: null,
    inventionIdx: 0,
    farmMode: "pientila",
    eduMode: "perus",
    detectiveShare: 0,
    industryFocus: 0,
    log: civ ? [{ year: 0, text: ST.civStartLog(civ.icon, civName, civTrait, civDesc), tone: "info" }] : [],
    milestones: civ ? [{ year: 0, text: ST.villageFoundedMilestone(villageLabel, civ.icon, civName, skillNames.length ? ST.startSkillsSuffix(skillNames.join(lang === "fi" ? " ja " : " & ")) : ".") }] : [],
    history: [{ year: 0, pop: 10000 }],
    stableTurns: 0,
    gameOver: null,
    lastEvent: null,
    report: null,
  };
};

const fmt = (n) => Math.round(n).toLocaleString("fi-FI");

function Yhteiskunta() {
  const [s, setS] = useState(makeStart(null));
  // ---- Aloitusnäkymä: sivilisaation valinta -> kylän nimeäminen ja aloitustaitojen valinta ----
  const [pendingCiv, setPendingCiv] = useState(null);
  const [villageNameInput, setVillageNameInput] = useState("");
  const [chosenSkills, setChosenSkills] = useState([]);
  const toggleSkill = (key) => {
    setChosenSkills((prev) => {
      if (prev.includes(key)) return prev.filter((k) => k !== key);
      if (prev.length >= 2) return prev;
      return [...prev, key];
    });
  };
  function startGame() {
    if (!pendingCiv || chosenSkills.length !== 2) return;
    setS(makeStart(pendingCiv, villageNameInput.trim(), chosenSkills, s.lang));
  }
  function changeLang(code) {
    setS((p) => ({ ...p, lang: code }));
  }
  const lang = s.lang || "fi";
  const t = (key) => U(lang, key);
  const tc = (table, key, field, fb) => T(lang, table, key, field, fb);
  const pop = s.children + s.workers + s.elderly;
  const era = ERAS[s.era];
  const nextEra = ERAS[s.era + 1];
  const M = useMemo(() => combinedMods(s.civ, s.nation, s.startSkills), [s.civ, s.nation, s.startSkills]);
  const eraMinPop = Math.round(era.minPop * M.minPop);

  const alloc = s.alloc;

  // ---- Johdetut tunnusluvut ----
  const derived = useMemo(() => {
    const gov = govByKey(s.gov);
    const farmMode = farmModeByKey(s.farmMode);
    const eduMode = eduModeByKey(s.eduMode);
    const w = (k) => (s.workers * alloc[k]) / 100;
    const farmers = w("farm"), medics = w("health"), teachers = w("edu");
    const skillPenalty = pop < eraMinPop ? Math.max(0.5, pop / eraMinPop) : 1;

    // Terveydenhuollon erikoistuminen (avautuu Teollisesta aikakaudesta alkaen): osa terveystyöntekijöistä
    // voi erikoistua, mikä nostaa kattavuutta enemmän per henkilö kuin yleislääkäri.
    const specShare = s.era >= 2 ? s.specialistShare / 100 : 0;
    const generalists = medics * (1 - specShare);
    const specialists = medics * specShare;
    const healthCov = Math.min(1.15, Math.max(0, (generalists + specialists * 1.4) / Math.max(1, pop * 0.018) + M.health));

    // Opetuksen suuntaus (peruskoulutus/ammatillinen/korkeakoulu) muuttaa koulutuskattavuuden painotusta
    const eduCov = Math.min(1.1, (teachers / Math.max(1, s.children / 20)) * eduMode.mods.eduCovMult);

    // Vanhusten hoivapanos: agraarisessa yhteiskunnassa vanhukset eivät jää muodolliselle eläkkeelle
    // vaan hoitavat lapsia ja tekevät kevyempiä askareita — näkyy "näkymättömänä" lisänä hoivakattavuuteen.
    const elderlyCareBoost = (s.elderly * era.elderCare) / Math.max(1, pop * 0.03);

    const cohesion = Math.min(1.1, (w("religion") / Math.max(1, pop * 0.006)) * gov.cohesionMod);
    const morale = Math.min(1.1, w("arts") / Math.max(1, pop * 0.005));
    // Rikostutkijat (avautuu Teollisesta): osa hallinnosta erikoistuu rikostutkintaan — vähentää hieman
    // yleistä hallintokattavuutta, mutta laskee rikollisuutta suoraan (ks. Yhteiskuntamittarit).
    const detectiveFrac = s.era >= 2 ? s.detectiveShare / 100 : 0;
    const adminCov = Math.min(1.1, (w("admin") / Math.max(1, pop * 0.015)) * gov.adminEff * (1 - 0.15 * detectiveFrac));
    const careCov = Math.min(1.1, w("services") / Math.max(1, pop * 0.03) + elderlyCareBoost);
    // Tutkimuksen erikoistuminen (avautuu Varhaisteollisesta): soveltava tutkimus nostaa
    // tuotannon tehokkuutta heti, perustutkimus kasvattaa tutkimuspisteitä nopeammin pitkällä aikavälillä.
    const appliedFrac = s.era >= 1 ? s.appliedShare / 100 : 0;
    // Teollisuuden suuntaus (avautuu Varhaisteollisesta): erikoistunut teollisuus nostaa tehokkuutta ja
    // BKT:ta, mutta saastuttaa enemmän kuin perustuotanto.
    const industryFrac = s.era >= 1 ? s.industryFocus / 100 : 0;
    const efficiency = (0.85 + 0.15 * Math.min(1, adminCov)) * (0.92 + 0.08 * Math.min(1, morale)) * (1 + 0.12 * appliedFrac) * eduMode.mods.industryEffMult * (1 + 0.08 * industryFrac);
    const foodProd = farmers * era.feeds * skillPenalty * M.farm * efficiency * farmMode.mods.feedsMult;
    // Ehkäisevä vs sairaalapainotteinen terveydenhuolto (avautuu Varhaisteollisesta)
    const preventiveFrac = s.era >= 1 ? 1 - s.healthFocus / 100 : 0.5;

    // Keski-ikä (karkea arvio ikäryhmien oletetusta keski-iästä) ja huoltosuhde
    const avgAge = (s.children * 7 + s.workers * 37 + s.elderly * 74) / Math.max(1, pop);
    const depRatio = s.workers > 0 ? ((s.children + s.elderly) / s.workers) * 100 : 0;

    // ---- Yhteiskuntamittarit: oikeita indikaattoreita mukailevat luvut sisäisistä muuttujista ----
    const lifeBase = [32, 42, 58, 78][s.era];
    const lifeExpectancy = Math.max(20, Math.min(90, lifeBase + (healthCov - 0.7) * 35 + (careCov - 0.5) * 10));
    const employmentRate = Math.max(0, Math.min(100, Math.round(100 * (0.8 + 0.2 * Math.min(1, adminCov)) * skillPenalty)));
    const industryShare = alloc.industry / 100;
    const pollutionEraFactor = [0.2, 0.6, 1.0, 0.5][s.era];
    const techCleanup = nextEra ? Math.min(0.4, (s.research / nextEra.research) * 0.4) : 0.4;
    const pollution = Math.max(0, Math.round(industryShare * pollutionEraFactor * 100 * (1 - techCleanup) * farmMode.mods.pollutionMult * (1 + 0.3 * industryFrac)));
    const gdpPerCapita = Math.round(50 * efficiency * (1 + s.era * 1.5) * (1 + (nextEra ? (s.research / nextEra.research) * 0.5 : 0.5)) * farmMode.mods.gdpMult * (1 + 0.2 * industryFrac));
    const crimeRate = Math.max(0, Math.round((60 - adminCov * 35 - cohesion * 20 + (100 - employmentRate) * 0.3) * (1 - 0.35 * detectiveFrac)));
    const happiness = Math.max(0, Math.min(10, healthCov * 2.5 + Math.min(1, cohesion) * 2 + Math.min(1, morale) * 2 + Math.min(1, s.foodStore / (pop * 2)) * 1.5 + ((100 - Math.min(100, crimeRate)) / 100) * 2));

    return { farmers, medics, teachers, generalists, specialists, foodProd, foodNeed: pop, healthCov, eduCov, cohesion, morale, adminCov, careCov, efficiency, skillPenalty, elderlyCareBoost, avgAge, depRatio, gov, appliedFrac, preventiveFrac, lifeExpectancy, employmentRate, pollution, gdpPerCapita, crimeRate, happiness, farmMode, eduMode, detectiveFrac, industryFrac };
  }, [s, pop, era, alloc, M, eraMinPop, nextEra]);

  // ---- Sivilisaatioindeksi: yhteiskunnan kokonaispistemäärä ----
  const score = useMemo(() => {
    const d = derived;
    const parts = {
      "Väestö": Math.round(1200 * Math.log10(Math.max(100, pop) / 100)),
      "Teknologia": s.era * 1500 + (nextEra ? Math.min(500, Math.round((s.research / nextEra.research) * 500)) : 500),
      "Terveys & sivistys": Math.round(300 * Math.min(1, d.healthCov) + 300 * Math.min(1, d.eduCov)),
      "Henki & yhteisöllisyys": Math.round(250 * Math.min(1, d.cohesion) + 250 * Math.min(1, d.morale)),
      "Hallinto & hoiva": Math.round(200 * Math.min(1, d.adminCov) + 200 * Math.min(1, d.careCov)),
      "Vauraus": Math.min(200, Math.round((s.foodStore / Math.max(1, pop)) * 100)),
      "Yhteiskuntamittarit": METRICS.filter((m) => s.era >= m.unlockEra).reduce((sum, m) => sum + m.scoreFn(d[m.key]), 0),
      "Kestävyys": s.year,
    };
    return { parts, total: Object.values(parts).reduce((a, b) => a + b, 0) };
  }, [derived, pop, s, nextEra]);

  // ---- Yhteinen tulostaulu (jaettu tallennustila) ----
  const [board, setBoard] = useState(null);

  // ---- Ammattitaulukko ----
  const professions = useMemo(() => {
    const w = (k) => Math.round((s.workers * alloc[k]) / 100);
    return [
      { name: t("profFarmName"), n: w("farm"), note: t("profFarmNote")(fmt(Math.round(era.feeds * M.farm * derived.efficiency * derived.skillPenalty * derived.farmMode.mods.feedsMult))) },
      { name: t("profHealthName"), n: w("health"), note: t("profHealthNote") },
      { name: t("profEduName"), n: w("edu"), note: t("profEduNote") },
      { name: t("profIndustryName"), n: w("industry"), note: t("profIndustryNote") },
      { name: t("profResearchName"), n: w("research"), note: t("profResearchNote") },
      { name: t("profReligionName"), n: w("religion"), note: t("profReligionNote") },
      { name: t("profArtsName"), n: w("arts"), note: t("profArtsNote") },
      { name: t("profAdminName"), n: w("admin"), note: t("profAdminNote") },
      { name: t("profServicesName"), n: w("services"), note: t("profServicesNote") },
    ];
  }, [s, alloc, era, M, derived, lang]);

  // ---- Allokaation säätö: lisäys otetaan suurimmasta sektorista, vähennys palautuu suurimpaan ----
  function setAlloc(key, val) {
    setS((p) => {
      val = Math.max(0, Math.min(100, val));
      let delta = val - p.alloc[key];
      if (delta === 0) return p;
      const next = { ...p.alloc, [key]: val };
      const others = SECTORS.map((x) => x.key).filter((k) => k !== key);
      // Lisäys: ota työvoima yksikkö kerrallaan siitä sektorista, jossa on eniten
      while (delta > 0) {
        const donor = others.reduce((a, b) => (next[a] >= next[b] ? a : b));
        if (next[donor] <= 0) { next[key] -= delta; break; }
        next[donor] -= 1;
        delta -= 1;
      }
      // Vähennys: vapautunut työvoima palaa suurimpaan sektoriin (yleensä pelloille)
      while (delta < 0) {
        const receiver = others.reduce((a, b) => (next[a] >= next[b] ? a : b));
        next[receiver] += 1;
        delta += 1;
      }
      return { ...p, alloc: next };
    });
  }

  // ---- Hallintomuodon vaihto ----
  function changeGov(key) {

  // ---- Erikoistumisosuuden säätö (terveydenhuolto, avautuu Teollisesta aikakaudesta) ----
  function setSpecialistShare(val) {
    setS((p) => ({ ...p, specialistShare: Math.max(0, Math.min(100, val)) }));
  }
  // ---- Ehkäisevä vs sairaalapainotteinen terveydenhuolto (avautuu Varhaisteollisesta) ----
  function setHealthFocus(val) {
    setS((p) => ({ ...p, healthFocus: Math.max(0, Math.min(100, val)) }));
  }
  // ---- Perustutkimus vs soveltava tutkimus (avautuu Varhaisteollisesta) ----
  function setAppliedShare(val) {
    setS((p) => ({ ...p, appliedShare: Math.max(0, Math.min(100, val)) }));
  }
  // ---- Maatalouden suuntaus (valinta, ei liukuva osuus) ----
  function setFarmMode(key) {
    setS((p) => {
      if (p.farmMode === key) return p;
      const m = farmModeByKey(key);
      const ST = STORY_TEXT[p.lang] || STORY_TEXT.fi;
      const mName = T(p.lang, "farmModes", m.key, "name", m.name);
      return { ...p, farmMode: key, milestones: [...p.milestones, { year: p.year, text: ST.farmModeChangeText(m.icon, mName) }] };
    });
  }
  // ---- Opetuksen suuntaus (valinta, ei liukuva osuus) ----
  function setEduMode(key) {
    setS((p) => {
      if (p.eduMode === key) return p;
      const m = eduModeByKey(key);
      const ST = STORY_TEXT[p.lang] || STORY_TEXT.fi;
      const mName = T(p.lang, "eduModes", m.key, "name", m.name);
      return { ...p, eduMode: key, milestones: [...p.milestones, { year: p.year, text: ST.eduModeChangeText(m.icon, mName) }] };
    });
  }
  // ---- Rikostutkijoiden osuus hallinnosta (avautuu Teollisesta) ----
  function setDetectiveShare(val) {
    setS((p) => ({ ...p, detectiveShare: Math.max(0, Math.min(100, val)) }));
  }
  // ---- Teollisuuden suuntaus: perustuotanto vs erikoistunut (avautuu Varhaisteollisesta) ----
  function setIndustryFocus(val) {
    setS((p) => ({ ...p, industryFocus: Math.max(0, Math.min(100, val)) }));
  }

  // ---- Vuoron simulointi (5 vuotta) ----
  function nextTurn() {
    setS((prev) => {
      if (prev.gameOver || !prev.civ) return prev;
      const lang = prev.lang || "fi";
      const ST = STORY_TEXT[lang] || STORY_TEXT.fi;
      const C = combinedMods(prev.civ, prev.nation, prev.startSkills);
      const a = prev.alloc;
      const total = Object.values(a).reduce((x, y) => x + y, 0);
      const norm = {}; SECTORS.forEach(({ key }) => (norm[key] = a[key] / total));

      let { children, workers, elderly, foodStore, research, era: eraIdx, stableTurns, gov: govKey, specialistShare, healthFocus, appliedShare, inventionIdx, farmMode: farmModeKey, eduMode: eduModeKey, detectiveShare, industryFocus } = prev;
      let popNow = children + workers + elderly;
      const E = ERAS[eraIdx];
      const G = govByKey(govKey);
      const eMinPop = Math.round(E.minPop * C.minPop);
      const nationEvents = prev.nation?.events;
      const ev = pickEvent(nationEvents);
      const log = [];

      const skillPenalty = popNow < eMinPop ? Math.max(0.5, popNow / eMinPop) : 1;

      // Terveys, koulutus ja neljä yhteiskuntamittaria
      const farmMode = farmModeByKey(farmModeKey);
      const eduMode = eduModeByKey(eduModeKey);
      const medics = workers * norm.health;
      const specShare = eraIdx >= 2 ? specialistShare / 100 : 0;
      const generalists = medics * (1 - specShare);
      const specialists = medics * specShare;
      const healthCov = Math.min(1.15, Math.max(0, (generalists + specialists * 1.4) / Math.max(1, popNow * 0.018) + C.health));
      const teachers = workers * norm.edu;
      const eduCov = Math.min(1.1, (teachers / Math.max(1, children / 20)) * eduMode.mods.eduCovMult);
      const cohesion = Math.min(1.1, ((workers * norm.religion) / Math.max(1, popNow * 0.006)) * G.cohesionMod);
      const morale = Math.min(1.1, (workers * norm.arts) / Math.max(1, popNow * 0.005));
      const detectiveFrac = eraIdx >= 2 ? detectiveShare / 100 : 0;
      const adminCov = Math.min(1.1, ((workers * norm.admin) / Math.max(1, popNow * 0.015)) * G.adminEff * (1 - 0.15 * detectiveFrac));
      // Vanhusten hoivapanos: he eivät jää muodolliselle eläkkeelle vaan hoitavat lapsia ja tekevät kevyempiä askareita
      const elderlyCareBoost = (elderly * E.elderCare) / Math.max(1, popNow * 0.03);
      const careCov = Math.min(1.1, (workers * norm.services) / Math.max(1, popNow * 0.03) + elderlyCareBoost);
      // Hallinto ja moraali kertautuvat kaikkeen tuotantoon; soveltava tutkimus ja erikoistunut teollisuus nostavat tehokkuutta heti
      const appliedFrac = eraIdx >= 1 ? appliedShare / 100 : 0;
      const industryFrac = eraIdx >= 1 ? industryFocus / 100 : 0;
      const efficiency = (0.85 + 0.15 * Math.min(1, adminCov)) * (0.92 + 0.08 * Math.min(1, morale)) * (1 + 0.12 * appliedFrac) * eduMode.mods.industryEffMult * (1 + 0.08 * industryFrac);
      // Ehkäisevä vs sairaalapainotteinen terveydenhuolto: ehkäisevä suojaa lapsia paremmin, sairaalapainotteinen aikuisia/vanhuksia
      const preventiveFrac = eraIdx >= 1 ? 1 - healthFocus / 100 : 0.5;
      if (adminCov < 0.6) {
        foodStore *= 0.9;
        log.push({ text: ST.adminDecay, tone: "bad" });
      }

      // Ruoka (resilience lieventää katovuoden osumaa, tehokkuus kertautuu tuotantoon)
      let foodEvMod = ev.foodMod ?? 1;
      if (foodEvMod < 1) foodEvMod = 1 - (1 - foodEvMod) * C.resilience;
      const farmers = workers * norm.farm;
      let foodProd = farmers * E.feeds * skillPenalty * C.farm * efficiency * foodEvMod * farmMode.mods.feedsMult;
      if (ev.storeMod) foodStore *= 1 - (1 - ev.storeMod) * C.resilience;
      const foodNeed = popNow;
      let foodRatio = 1;
      const storeCap = popNow * 2 * C.store;
      if (foodProd >= foodNeed) {
        foodStore = Math.min(storeCap, foodStore + (foodProd - foodNeed) * 0.5);
      } else {
        const deficit = foodNeed - foodProd;
        const fromStore = Math.min(foodStore, deficit);
        foodStore -= fromStore;
        const stillMissing = deficit - fromStore;
        foodRatio = 1 - stillMissing / foodNeed;
      }

      // Kuolleisuus (5 v) — resilience lieventää nälän ja epidemian vaikutusta, hoiva suojaa lapsia ja vanhuksia.
      // Ehkäisevä painotus suojaa erityisesti lapsia ja epidemioita vastaan, sairaalapainotteinen aikuisia/vanhuksia.
      const famine = (foodRatio < 1 ? (1 - foodRatio) : 0) * C.resilience * farmMode.mods.resilienceMult;
      let childMort = E.childMort * (1.6 - 0.6 * healthCov) * (1.15 - 0.15 * Math.min(1, careCov)) * (1 - 0.15 * preventiveFrac) + famine * 0.5;
      let workerMort = 0.02 * (1.5 - 0.5 * healthCov) + famine * 0.3;
      let elderMort = 0.28 * (1.5 - 0.5 * healthCov) * (1.25 - 0.25 * Math.min(1, careCov)) * (1 - 0.15 * (1 - preventiveFrac)) + famine * 0.6;
      if (ev.epidemic) {
        const hit = 0.12 * (1.4 - healthCov) * C.resilience * (1 - 0.2 * preventiveFrac);
        childMort += hit; workerMort += hit * 0.6; elderMort += hit * 1.5;
        log.push({ text: healthCov > 0.9 ? ST.epidemicHandled : ST.epidemicBad, tone: healthCov > 0.9 ? "good" : "bad" });
      }
      childMort = Math.min(0.9, childMort); workerMort = Math.min(0.9, workerMort); elderMort = Math.min(0.95, elderMort);

      const childDeaths = children * childMort;
      const workerDeaths = workers * workerMort;
      const elderDeaths = elderly * elderMort;

      // Syntyvyys — demografinen siirtymä: varhaiset yhteiskunnat synnyttävät paljon (koska moni kuolee),
      // modernit vähän. TFR5 = syntymiä per hedelmällisessä iässä oleva nainen / 5 vuotta.
      const TFR5 = [0.9, 0.8, 0.65, 0.5][eraIdx];
      const fertileWomen = workers * 0.5 * 0.6;
      const birthFactor = C.birth * (0.85 + 0.25 * Math.min(1, cohesion)) * Math.min(1.1, foodRatio * 0.7 + 0.3 + foodStore / (popNow * 6)) * (ev.birthMod ?? 1);
      const births = fertileWomen * TFR5 * birthFactor;

      // Hajaannus: ilman yhteisiä merkityksiä väkeä erkaantuu yhteisöstä
      let leaverCount = 0;
      if (cohesion < 0.5 && popNow > 500) {
        const leavers = 0.02 * (1 - cohesion);
        leaverCount = popNow * leavers;
        children *= 1 - leavers; workers *= 1 - leavers; elderly *= 1 - leavers;
        log.push({ text: ST.leaversLog(fmt(leaverCount)), tone: "bad" });
      }

      // Levottomuudet: tyytymättömyys (matala yhteisöllisyys/moraali) yhdistettynä hallintomuodon
      // omaan levottomuusriskiin voi johtaa kapinaan — itsevaltaiset/uskonnolliset hallinnot kaatuvat helpommin.
      let unrestHappened = false;
      if (cohesion < 0.55 && morale < 0.55) {
        const unrestChance = Math.min(0.6, G.unrest * 4);
        if (Math.random() < unrestChance) {
          unrestHappened = true;
          const hit = 0.01 + 0.02 * (1 - cohesion);
          children *= 1 - hit; workers *= 1 - hit; elderly *= 1 - hit;
          if (G.axis === "Itsevaltainen" || G.axis === "Uskonnollinen") {
            govKey = "heimo";
            log.push({ text: ST.rebellionLog(T(lang, "governments", G.key, "name", G.name).toLowerCase()), tone: "bad" });
          } else {
            log.push({ text: ST.unrestLog, tone: "bad" });
          }
        }
      }

      // Ikääntyminen
      const grownUp = children * 0.27;
      const retired = workers * 0.10;

      children = children - childDeaths - grownUp + births;
      workers = workers - workerDeaths - retired + grownUp;
      elderly = elderly - elderDeaths + retired;

      let migrantCount = 0;
      if (ev.migration) {
        migrantCount = popNow * ev.migration;
        children += migrantCount * 0.25; workers += migrantCount * 0.6; elderly += migrantCount * 0.15;
      }

      // Tutkimus — hallinto ja moraali vaikuttavat tähänkin. Soveltavaan tutkimukseen painottuminen
      // näkyy jo efficiency-kertoimessa (nopeampi tuotanto), mutta hidastaa puhtaan tutkimuspisteen kertymää.
      const researchers = workers * norm.research;
      const researchGained = researchers * 0.15 * (0.5 + eduCov) * efficiency * C.research * G.researchMod * eduMode.mods.researchMult * (1 - 0.4 * appliedFrac) * (1 + 0.15 * industryFrac) + (ev.bonusResearch ?? 0);
      research = Math.max(0, research + researchGained);

      // Aikakausisiirtymä
      const eraBeforeAdvance = eraIdx;
      const N = ERAS[eraIdx + 1];
      const nMinPop = N ? Math.round(N.minPop * C.minPop) : 0;
      let eraAdvanced = false;
      const nEraIdxForT = eraBeforeAdvance + 1;
      if (N && research >= N.research && children + workers + elderly >= nMinPop * 0.6) {
        eraIdx++; eraAdvanced = true;
        log.push({ text: ST.eraAdvanceLog(TE(lang, nEraIdxForT, "name", N.name), TE(lang, nEraIdxForT, "desc", N.desc)), tone: "good" });
      } else if (N && research >= N.research) {
        log.push({ text: ST.eraNotYetLog(TE(lang, nEraIdxForT, "name", N.name).toLowerCase(), fmt(nMinPop * 0.6)), tone: "info" });
      }

      // ===== KEKSINNÖT: tutkimuksen edistyessä paljastuu aikakaudelle ominaisia keksintöjä =====
      const invList = INVENTIONS_BY_ERA[eraBeforeAdvance] || [];
      let newInventionIdx = inventionIdx;
      let inventionReveal = null;
      let inventionRevealIdx = -1;
      if (invList.length) {
        if (N) {
          const milestone = Math.min(invList.length - 1, Math.floor((Math.max(0, research) / N.research) * invList.length));
          if (milestone > inventionIdx) { inventionReveal = invList[milestone]; inventionRevealIdx = milestone; newInventionIdx = milestone; }
        } else if (Math.random() < 0.35) {
          const idx = Math.floor(Math.random() * invList.length);
          inventionReveal = invList[idx];
          inventionRevealIdx = idx;
        }
      }
      if (eraAdvanced) newInventionIdx = 0;
      const inventionRevealName = inventionReveal ? TInv(lang, eraBeforeAdvance, inventionRevealIdx, "name", inventionReveal.name) : null;
      const inventionRevealDesc = inventionReveal ? TInv(lang, eraBeforeAdvance, inventionRevealIdx, "desc", inventionReveal.desc) : null;

      const newPop = children + workers + elderly;
      const year = prev.year + 5;
      const totalDeaths = childDeaths + workerDeaths + elderDeaths;
      const educated = grownUp * Math.min(1, eduCov);

      // ===== VIISIVUOTISKERTOMUS: tarina siitä, mitä tapahtui =====
      const p = [];
      const advancedEraName = TE(lang, eraIdx, "name", ERAS[eraIdx].name);
      // Avaus tapahtuman mukaan
      p.push((ST.openers[ev.id] ?? ST.openers.default)(prev.year, year));
      // Ruoka
      if (famine > 0.02) p.push(ST.famine(Math.round(foodRatio * 100)));
      else if (foodProd > foodNeed * 1.3) p.push(ST.goodHarvest(fmt(farmers)));
      else p.push(ST.steadyHarvest(fmt(farmers)));
      // Väestö
      p.push(ST.demography(fmt(births), fmt(totalDeaths), fmt(childDeaths), fmt(workerDeaths), fmt(elderDeaths)));
      const retirementPhrase = ST.retirementPhrase[eraBeforeAdvance](fmt(retired));
      p.push(ST.grownUp(fmt(grownUp), fmt(educated), eduCov < 0.6, retirementPhrase));
      if (leaverCount > 0) p.push(ST.leavers(fmt(leaverCount)));
      if (migrantCount > 0) p.push(ST.migrants(fmt(migrantCount)));
      // Henki & tiede
      if (morale > 1 && cohesion > 1) p.push(ST.spiritHigh);
      else if (cohesion < 0.5) p.push(ST.spiritLow);
      if (inventionReveal) {
        // Keksintö kudotaan osaksi samaa virkettä kuin tutkimustulos, ei erillisenä lisättynä huomiona.
        p.push(ST.inventionSentence(fmt(researchGained), inventionRevealName, inventionRevealDesc, eraAdvanced, advancedEraName));
        log.push({ text: ST.inventionLog(inventionRevealName, inventionRevealDesc), tone: "good" });
      } else if (researchGained > 0) {
        p.push(ST.researchOnlySentence(fmt(researchGained), eraAdvanced, advancedEraName.toLowerCase()));
      }
      const story = p.join(" ");

      // ===== VUOSI VUODELTA: viiden vuoden päätapahtumat samaan kertomukseen =====
      // Yksi näistä (primaryOffset) on sama tapahtuma, joka oikeasti vaikutti tämän jakson laskelmiin (ev).
      // Muut neljä ovat kertomuksellista väriä sen rinnalle, ilman erillistä vaikutusta lukuihin.
      const primaryOffset = 1 + Math.floor(Math.random() * 5);
      const years = [];
      for (let yo = 1; yo <= 5; yo++) {
        const ye = yo === primaryOffset ? ev : pickEvent(nationEvents);
        years.push({ year: prev.year + yo, name: T(lang, "events", ye.id, "name", ye.name), desc: T(lang, "events", ye.id, "desc", ye.desc), primary: yo === primaryOffset });
      }

      const factIdx = prev.history.length % FACTS.length;
      const evName = T(lang, "events", ev.id, "name", ev.name);
      const evDesc = T(lang, "events", ev.id, "desc", ev.desc);
      const report = {
        period: `${prev.year}–${year}`,
        story,
        years,
        eraIdx: eraBeforeAdvance,
        invention: inventionReveal,
        fact: TFact(lang, factIdx, FACTS[factIdx]),
        eventName: evName,
        rows: [
          [U(lang, "reportBorn"), "+" + fmt(births)],
          [U(lang, "reportDied"), "−" + fmt(totalDeaths)],
          [U(lang, "reportDiedChildren"), fmt(childDeaths)],
          [U(lang, "reportDiedWorkers"), fmt(workerDeaths)],
          [U(lang, "reportDiedElderly"), fmt(elderDeaths)],
          [U(lang, "reportGrownUp"), fmt(grownUp)],
          [U(lang, "reportEducated"), fmt(educated)],
          [U(lang, "reportRetired"), fmt(retired)],
          ...(leaverCount > 0 ? [[U(lang, "reportLeft"), "−" + fmt(leaverCount)]] : []),
          ...(migrantCount > 0 ? [[U(lang, "reportArrived"), "+" + fmt(migrantCount)]] : []),
          [U(lang, "reportFoodProdNeed"), `${fmt(foodProd)} / ${fmt(foodNeed)}`],
          [U(lang, "reportResearchGained"), "+" + fmt(researchGained)],
          [U(lang, "reportPopChange"), (newPop >= popNow ? "+" : "") + fmt(newPop - popNow)],
        ],
      };

      log.unshift({ text: `${evName}: ${evDesc}`, tone: ev.foodMod < 1 || ev.epidemic || ev.storeMod ? "bad" : ev.id === "rauha" ? "info" : "good" });
      if (famine > 0.02) log.push({ text: ST.famineLog(Math.round(foodRatio * 100), fmt(childDeaths + workerDeaths + elderDeaths)), tone: "bad" });
      if (skillPenalty < 1) log.push({ text: ST.skillGapLog(TE(lang, prev.era, "name", E.name), fmt(eMinPop), Math.round(skillPenalty * 100)), tone: "bad" });

      const civNameForEnd = T(lang, "civs", prev.civ.key, "name", prev.civ.name);
      let gameOver = null;
      if (newPop < 150) {
        gameOver = { win: false, text: ST.gameOverLose(civNameForEnd, year, fmt(newPop)) };
      } else {
        if (eraIdx === 3 && newPop > prev.history[prev.history.length - 1].pop * 0.98) stableTurns++;
        else stableTurns = 0;
        if (stableTurns >= 3) gameOver = { win: true, text: ST.gameOverWin(year, civNameForEnd, fmt(newPop)) };
      }

      const newMilestones = [];
      if (eraAdvanced) newMilestones.push({ year, text: ST.eraAdvanceMilestone(advancedEraName, year) });
      if (inventionReveal) newMilestones.push({ year, text: ST.inventionLog(inventionRevealName, inventionRevealDesc) });

      return {
        ...prev,
        year, children, workers, elderly, foodStore, research, era: eraIdx, stableTurns, gov: govKey, inventionIdx: newInventionIdx,
        lastEvent: ev, report,
        log: [...log.map((l) => ({ year, ...l })), ...prev.log].slice(0, 40),
        milestones: newMilestones.length ? [...prev.milestones, ...newMilestones] : prev.milestones,
        history: [...prev.history, { year, pop: Math.round(newPop) }],
        gameOver,
      };
    });
  }

  const foodBalance = derived.foodProd - derived.foodNeed;

  const Stat = ({ label, value, sub, warn }) => (
    <div style={{ background: "#12233a", padding: "10px 14px", minWidth: 0 }}>
      <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1.5, color: "#93a3ba", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{label}</div>
      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 18, fontWeight: 600, color: warn ? "#c96a5a" : "#e9e2cf", lineHeight: 1.3 }}>{value}</div>
      {sub && <div style={{ fontSize: 10.5, color: warn ? "#c96a5a" : "#93a3ba", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{sub}</div>}
    </div>
  );

  // Pieni "ℹ️" -painike joka avaa selittävän tekstin omaan modaliin, jotta pääruutu pysyy siistinä
  const InfoButton = ({ title, text }) => (
    <button className="info-btn" onClick={() => setInfoModal({ title, text })} aria-label={t("infoBtnAria")}>ℹ️</button>
  );

  const Section = ({ title, open, onToggle, children, right }) => (
    <div>
      <div className="section-head" onClick={onToggle} style={{ borderBottom: "1px solid #c9a22755", paddingBottom: 6, marginBottom: 12 }}>
        <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 20, fontWeight: 700, margin: 0, color: "#f0e8d2" }}>{title}</h2>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {right}
          <span className="chevron" style={{ transform: open ? "rotate(90deg)" : "rotate(0deg)" }}>▶</span>
        </div>
      </div>
      {open && <div>{children}</div>}
    </div>
  );

  // Pieni valintarivi laadullisille suuntauksille (maatalous, opetus) — ei liukuva osuus vaan valinta yhdestä vaihtoehdosta
  const ModeSelector = ({ modes, current, onSelect, eraIdx, disabled, table }) => (
    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
      {modes.map((m) => {
        const unlocked = eraIdx >= m.minEra;
        const active = current === m.key;
        return (
          <button
            key={m.key}
            disabled={!unlocked || disabled}
            onClick={() => onSelect(m.key)}
            title={tc(table, m.key, "desc", m.desc)}
            style={{
              font: "inherit", cursor: unlocked ? "pointer" : "not-allowed", fontSize: 11.5, padding: "5px 8px", borderRadius: 6,
              border: active ? "1.5px solid #c9a227" : "1px solid #2a3d57",
              background: active ? "rgba(201,162,39,0.14)" : "#12233a",
              color: "#cfd6de",
              opacity: unlocked ? 1 : 0.45,
            }}
          >
            {m.icon} {tc(table, m.key, "name", m.name)}{!unlocked && " 🔒"}
          </button>
        );
      })}
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(175deg,#101f33 0%,#0c1828 100%)", fontFamily: "'Source Sans 3', sans-serif", color: "#e9e2cf", padding: 16 }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
        input[type=range]{accent-color:#c9a227;width:100%}
        .btn{background:linear-gradient(180deg,#d4af37,#b8922a);color:#14243a;border:none;padding:13px 28px;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;border-radius:6px;cursor:pointer;letter-spacing:0.5px;transition:filter .15s,transform .1s}
        .btn:hover{filter:brightness(1.06)}
        .btn:active{transform:scale(0.98)}
        .btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
        .paper{background:#12233a;border:1px solid #2a3d57;border-radius:8px;padding:16px}
        .modal-panel{background:#0d1c30;border:1px solid #2a3d57;border-radius:12px;padding:18px 20px;animation:museoModalIn .2s ease-out}
        @keyframes museoModalIn{from{opacity:0;transform:scale(0.98)}to{opacity:1;transform:scale(1)}}
        .civcard{background:#12233a;border:1px solid #263a54;border-radius:8px;padding:12px;cursor:pointer;transition:border-color .15s;text-align:left;color:#e9e2cf}
        .civcard:hover{border-color:#3a5273}
        .step{min-width:46px;height:44px;border:1.5px solid #c9a22766;background:none;color:#c9a227;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;border-radius:9px;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent;padding:0}
        .step:active:not(:disabled){background:#c9a227;color:#14243a;transform:scale(0.95)}
        .step:disabled{opacity:.25;cursor:not-allowed}
        .section-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
        .chevron{transition:transform .15s;font-size:13px;color:#c9a227}
        .info-btn{border:none;background:none;color:#c9a227;font-size:13px;cursor:pointer;padding:2px 4px;vertical-align:middle}
        .grid2{display:grid;grid-template-columns:1.2fr 1fr;gap:20px;align-items:start}
        .grid-graphlog{display:grid;grid-template-columns:minmax(220px,1fr) 2fr;gap:14px;margin-top:10px}
        .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:#263a54;border:1px solid #263a54;border-radius:8px;overflow:hidden;margin-bottom:16px}
        .lang-switch button{font:inherit;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.5px;padding:3px 7px;border-radius:4px;cursor:pointer;background:none;border:1px solid #2a3d57;color:#93a3ba}
        .lang-switch button.active{border-color:#c9a227;color:#c9a227}
        @media (max-width:680px){
          .grid2{grid-template-columns:1fr}
          .grid-graphlog{grid-template-columns:1fr}
          .stat-grid{grid-auto-flow:column;grid-auto-columns:minmax(118px,1fr);overflow-x:auto}
        }
        @media (max-width:400px){
          .btn{padding:12px 18px;font-size:16px}
        }
      `}</style>

      <div style={{ maxWidth: 980, margin: "0 auto" }}>
        <div className="lang-switch" style={{ display: "flex", justifyContent: "flex-end", gap: 4, marginBottom: 8 }} role="group" aria-label={t("langSwitcherAria")}>
          {LOCALES.map((code) => (
            <button key={code} className={lang === code ? "active" : ""} onClick={() => changeLang(code)}>{code.toUpperCase()}</button>
          ))}
        </div>
        {s.civ ? (
          <header style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 8, marginBottom: 16, paddingBottom: 14, borderBottom: "1px solid #263a54" }}>
            <div>
              <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(20px,3.2vw,30px)", fontWeight: 700, letterSpacing: 0.5, color: "#f0e8d2" }}>
                {s.villageName && <>{s.villageName} <span style={{ color: "#c9a227" }}>·</span> </>}
                {s.nation ? `${s.nation.icon} ${tc("nations", s.nation.key, "name", s.nation.name)}` : `${s.civ.icon} ${tc("civs", s.civ.key, "name", s.civ.name)}`}
              </div>
              <div style={{ fontSize: 13, color: "#93a3ba", letterSpacing: 2, textTransform: "uppercase", marginTop: 2 }}>
                {t("eraYearLabel")(TE(lang, s.era, "name", era.name), s.year)}
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#93a3ba" }}>{t("civIndexLabel")}</div>
              <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 30, fontWeight: 700, color: "#c9a227", lineHeight: 1 }}>{fmt(score.total)}</div>
            </div>
          </header>
        ) : (
          <header style={{ textAlign: "center", marginBottom: 16, borderBottom: "1px solid #263a54", paddingBottom: 14 }}>
            <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(22px,4vw,34px)", fontWeight: 700, margin: 0, letterSpacing: 0.5, color: "#f0e8d2" }}>
              {t("appTitle")}
            </h1>
            <div style={{ color: "#93a3ba", marginTop: 4, fontSize: 14 }}>
              {t("appTagline")}
            </div>
          </header>
        )}

        {/* ===== SIVILISAATION VALINTA ===== */}
        {!s.civ && !pendingCiv && (
          <div>
            <p style={{ textAlign: "center", fontSize: 16, color: "#93a3ba", maxWidth: 640, margin: "0 auto 16px" }}>
              {t("chooseCivIntro")}
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(215px,1fr))", gap: 10 }}>
              {CIVS.map((c) => {
                const mods = Object.entries(c.mods);
                return (
                  <button key={c.key} className="civcard" onClick={() => setPendingCiv(c)}>
                    <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 17, fontWeight: 700, color: "#f0e8d2" }}>{c.icon} {tc("civs", c.key, "name", c.name)}</div>
                    <div style={{ fontSize: 12, color: "#c9a227", fontWeight: 600, margin: "2px 0 4px" }}>{tc("civs", c.key, "trait", c.trait)}</div>
                    <div style={{ fontSize: 12, color: "#cfd6de", marginBottom: 6 }}>{tc("civs", c.key, "desc", c.desc)}</div>
                    {mods.map(([k, v]) => (
                      <div key={k} style={{ fontSize: 11, fontFamily: "'IBM Plex Mono',monospace", color: (k === "resilience" || k === "minPop" ? v < 1 : k === "health" ? v > 0 : v > 1) ? "#7fbf8f" : "#c96a5a" }}>
                        {(k === "resilience" || k === "minPop" ? v < 1 : k === "health" ? v > 0 : v > 1) ? "▲" : "▼"} {modLabel(lang, k, v)}
                      </div>
                    ))}
                  </button>
                );
              })}
            </div>
            <p style={{ textAlign: "center", fontSize: 12, color: "#93a3ba", marginTop: 14 }}>
              {t("civFootnote")}
            </p>
          </div>
        )}

        {/* ===== KYLÄN NIMEÄMINEN JA ALOITUSTAIDOT ===== */}
        {!s.civ && pendingCiv && (
          <div style={{ maxWidth: 640, margin: "0 auto" }}>
            <button onClick={() => { setPendingCiv(null); setChosenSkills([]); }} style={{ background: "none", border: "none", color: "#c9a227", fontSize: 13, cursor: "pointer", padding: 0, marginBottom: 12 }}>{t("changeCiv")}</button>
            <div className="paper" style={{ marginBottom: 14 }}>
              <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 18, fontWeight: 700, marginBottom: 10, color: "#f0e8d2" }}>{pendingCiv.icon} {t("nameYourVillage")(tc("civs", pendingCiv.key, "name", pendingCiv.name))}</div>
              <input
                value={villageNameInput}
                onChange={(e) => setVillageNameInput(e.target.value.slice(0, 30))}
                placeholder={t("villageNamePlaceholder")}
                style={{ width: "100%", padding: "10px 12px", fontSize: 15, fontFamily: "'Source Sans 3',sans-serif", color: "#e9e2cf", border: "1.5px solid #c9a22766", borderRadius: 8, background: "#0d1c30", boxSizing: "border-box" }}
              />
              <p style={{ fontSize: 12, color: "#93a3ba", margin: "6px 0 0" }}>{t("villageNameHint")}</p>
            </div>

            <div className="paper">
              <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 18, fontWeight: 700, marginBottom: 4, color: "#f0e8d2" }}>{t("chooseTwoSkills")}</div>
              <p style={{ fontSize: 12.5, color: "#93a3ba", margin: "0 0 10px" }}>{t("chosenSkillsHint")(chosenSkills.length)}</p>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(230px,1fr))", gap: 8 }}>
                {STARTING_SKILLS.map((sk) => {
                  const active = chosenSkills.includes(sk.key);
                  const disabled = !active && chosenSkills.length >= 2;
                  return (
                    <button
                      key={sk.key}
                      onClick={() => toggleSkill(sk.key)}
                      disabled={disabled}
                      className="civcard"
                      style={{ borderColor: active ? "#c9a227" : "#263a54", background: active ? "rgba(201,162,39,0.14)" : "#12233a", opacity: disabled ? 0.45 : 1, cursor: disabled ? "not-allowed" : "pointer" }}
                    >
                      <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 15, fontWeight: 700, color: "#f0e8d2" }}>{sk.icon} {tc("skills", sk.key, "name", sk.name)}{active && " ✓"}</div>
                      <div style={{ fontSize: 11.5, color: "#cfd6de", marginTop: 2 }}>{tc("skills", sk.key, "desc", sk.desc)}</div>
                    </button>
                  );
                })}
              </div>
            </div>

            <div style={{ textAlign: "center", marginTop: 16 }}>
              <button className="btn" onClick={startGame} disabled={chosenSkills.length !== 2}>{t("startBtn")}</button>
            </div>
          </div>
        )}

        {/* ===== ITSE PELI ===== */}
        {s.civ && (
          <>
            <div className="stat-grid">
              <Stat label={t("statPop")} value={fmt(pop)} sub={`👶${fmt(s.children)} 💪${fmt(s.workers)} 👴${fmt(s.elderly)}`} warn={pop < 2000} />
              <Stat label={t("statFood")} value={fmt(s.foodStore)} sub={`${t("statBalance")} ${foodBalance >= 0 ? "+" : ""}${fmt(foodBalance)}`} warn={foodBalance < 0 && s.foodStore < pop * 0.5} />
              <Stat label={t("statResearch")} value={nextEra ? `${fmt(s.research)}/${fmt(nextEra.research)}` : fmt(s.research)} sub={nextEra ? `→ ${TE(lang, s.era + 1, "name", nextEra.name)}` : t("statTopEra")} />
              <Stat label={t("statLife")} value={Math.round(derived.lifeExpectancy) + T(lang, "metrics", "lifeExpectancy", "unit", " v")} />
              <Stat label={t("statHealth")} value={Math.round(derived.healthCov * 100) + " %"} sub={t("statHealthSub")(Math.round(derived.eduCov * 100), Math.round(derived.careCov * 100))} warn={derived.healthCov < 0.7} />
              <Stat label={t("statCommunity")} value={Math.round(derived.cohesion * 100) + " %"} sub={t("statCommunitySub")(Math.round(derived.morale * 100))} warn={derived.cohesion < 0.5 || derived.adminCov < 0.6} />
            </div>

            <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
              <button onClick={() => setPyramidOpen(true)} className="paper" style={{ cursor: "pointer", font: "inherit", padding: "6px 12px", fontSize: 13, color: "#cfd6de" }}>
                {t("pyramidBtn")(Math.round(derived.avgAge))}

                              <span style={{ display: "block", color: "#93a3ba", fontSize: 11.5 }}>{y.desc}</span>
                            </span>
                          </div>
                        ))}
                      </div>
                      <div style={{ fontSize: 10.5, color: "#93a3ba", marginTop: 4 }}>{t("yearByYearNote")}</div>
                    </div>
                  </div>
                  <details style={{ marginTop: 10 }}>
                    <summary style={{ cursor: "pointer", fontSize: 13, color: "#c9a227", fontWeight: 600 }}>{t("showNumbers")}</summary>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, marginTop: 8 }}>
                      <tbody>
                        {s.report.rows.map(([k, v]) => (
                          <tr key={k} style={{ borderBottom: "1px dotted #263a54" }}>
                            <td style={{ padding: "3px 4px", color: k.startsWith("  ") ? "#93a3ba" : "#cfd6de", paddingLeft: k.startsWith("  ") ? 20 : 4 }}>{k.trim()}</td>
                            <td style={{ textAlign: "right", fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: v.startsWith("−") ? "#c96a5a" : v.startsWith("+") ? "#7fbf8f" : "#e9e2cf" }}>{v}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </details>
                  <div style={{ textAlign: "center", marginTop: 14 }}>
                    <button className="btn" style={{ padding: "10px 20px", fontSize: 15 }} onClick={() => setReportOpen(false)}>{t("closeBtn")}</button>
                  </div>
                </div>
              </div>
              )}

            <div className="grid2">
              <Section title={t("workforceTitle")} open={allocOpen} onToggle={() => setAllocOpen(!allocOpen)}>
                {(() => {
                  const maxAllocVal = Math.max(...SECTORS.map((x) => alloc[x.key]));
                  return SECTORS.map(({ key, name, icon }) => (
                  <div key={key} style={{ marginBottom: 13 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", fontSize: 14, marginBottom: 5, color: "#e9e2cf" }}>
                      <span>{icon} {tc("sectors", key, "name", name)}</span>
                      <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: "#c9a227" }}>{alloc[key]} % · {fmt((s.workers * alloc[key]) / 100)} {t("personsUnit")}</span>
                    </div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                      <button className="step" onClick={() => setAlloc(key, alloc[key] - 5)} disabled={!!s.gameOver || alloc[key] <= 0}>−5</button>
                      <button className="step" onClick={() => setAlloc(key, alloc[key] - 1)} disabled={!!s.gameOver || alloc[key] <= 0}>−1</button>
                      <div style={{ flex: 1, height: 8, background: "#1c3049", borderRadius: 4, overflow: "hidden" }}>
                        <div style={{ width: `${alloc[key]}%`, height: "100%", background: alloc[key] === maxAllocVal ? "linear-gradient(90deg,#a3822a,#c9a227)" : "#c9a227", transition: "width .3s ease" }} />
                      </div>
                      <button className="step" onClick={() => setAlloc(key, alloc[key] + 1)} disabled={!!s.gameOver || alloc[key] >= 100}>+1</button>
                      <button className="step" onClick={() => setAlloc(key, alloc[key] + 5)} disabled={!!s.gameOver || alloc[key] >= 100}>+5</button>
                    </div>

                    {key === "farm" && (
                      <div style={{ marginTop: 6, paddingLeft: 4, borderLeft: "2px solid #263a54" }}>
                        <div style={{ fontSize: 12, color: "#93a3ba", marginBottom: 4 }}>
                          {t("farmModeLabel")} <InfoButton title={t("farmModeInfoTitle")} text={t("farmModeInfoText")} />
                        </div>
                        <ModeSelector modes={FARM_MODES} current={s.farmMode} onSelect={setFarmMode} eraIdx={s.era} disabled={!!s.gameOver} table="farmModes" />
                      </div>
                    )}

                    {key === "health" && (
                      <div style={{ marginTop: 6, paddingLeft: 4, borderLeft: "2px solid #263a54" }}>
                        {s.era >= 1 ? (
                          <>
                            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#93a3ba", marginBottom: 4 }}>
                              <span>{t("healthFocusLabel")}</span>
                              <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: "#c9a227" }}>{s.healthFocus}%</span>
                            </div>
                            <div style={{ display: "flex", gap: 5, alignItems: "center", marginBottom: 6 }}>
                              <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setHealthFocus(s.healthFocus - 10)} disabled={!!s.gameOver || s.healthFocus <= 0}>−10</button>
                              <div style={{ flex: 1, height: 8, background: "#1c3049", borderRadius: 4, overflow: "hidden" }}>
                                <div style={{ width: `${s.healthFocus}%`, height: "100%", background: "linear-gradient(90deg,#a3822a,#c9a227)" }} />
                              </div>
                              <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setHealthFocus(s.healthFocus + 10)} disabled={!!s.gameOver || s.healthFocus >= 100}>+10</button>
                              <InfoButton title={t("healthFocusInfoTitle")} text={t("healthFocusInfoText")} />
                            </div>
                            {s.era >= 2 ? (
                              <>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#93a3ba", marginBottom: 4 }}>
                                  <span>{t("specialistLabel")}</span>
                                  <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: "#c9a227" }}>{s.specialistShare}%</span>
                                </div>
                                <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                                  <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setSpecialistShare(s.specialistShare - 10)} disabled={!!s.gameOver || s.specialistShare <= 0}>−10</button>
                                  <div style={{ flex: 1, height: 8, background: "#1c3049", borderRadius: 4, overflow: "hidden" }}>
                                    <div style={{ width: `${s.specialistShare}%`, height: "100%", background: "linear-gradient(90deg,#a3822a,#c9a227)" }} />
                                  </div>
                                  <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setSpecialistShare(s.specialistShare + 10)} disabled={!!s.gameOver || s.specialistShare >= 100}>+10</button>
                                  <InfoButton title={t("specialistInfoTitle")} text={t("specialistInfoText")} />
                                </div>
                              </>
                            ) : (
                              <div style={{ fontSize: 10.5, color: "#93a3ba" }}>{t("specialistLockedEarly")}</div>
                            )}
                          </>
                        ) : (
                          <div style={{ fontSize: 10.5, color: "#93a3ba" }}>{t("healthLockedEarly")}</div>
                        )}
                      </div>
                    )}

                    {key === "research" && (
                      <div style={{ marginTop: 6, paddingLeft: 4, borderLeft: "2px solid #263a54" }}>
                        {s.era >= 1 ? (
                          <>
                            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#93a3ba", marginBottom: 4 }}>
                              <span>{t("appliedLabel")}</span>
                              <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: "#c9a227" }}>{s.appliedShare}%</span>
                            </div>
                            <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                              <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setAppliedShare(s.appliedShare - 10)} disabled={!!s.gameOver || s.appliedShare <= 0}>−10</button>
                              <div style={{ flex: 1, height: 8, background: "#1c3049", borderRadius: 4, overflow: "hidden" }}>
                                <div style={{ width: `${s.appliedShare}%`, height: "100%", background: "linear-gradient(90deg,#a3822a,#c9a227)" }} />
                              </div>
                              <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setAppliedShare(s.appliedShare + 10)} disabled={!!s.gameOver || s.appliedShare >= 100}>+10</button>
                              <InfoButton title={t("appliedInfoTitle")} text={t("appliedInfoText")} />
                            </div>
                          </>
                        ) : (
                          <div style={{ fontSize: 10.5, color: "#93a3ba" }}>{t("researchLockedEarly")}</div>
                        )}
                      </div>
                    )}

                    {key === "edu" && (
                      <div style={{ marginTop: 6, paddingLeft: 4, borderLeft: "2px solid #263a54" }}>
                        <div style={{ fontSize: 12, color: "#93a3ba", marginBottom: 4 }}>
                          {t("eduModeLabel")} <InfoButton title={t("eduModeInfoTitle")} text={t("eduModeInfoText")} />
                        </div>
                        <ModeSelector modes={EDU_MODES} current={s.eduMode} onSelect={setEduMode} eraIdx={s.era} disabled={!!s.gameOver} table="eduModes" />
                      </div>
                    )}

                    {key === "admin" && (
                      <div style={{ marginTop: 6, paddingLeft: 4, borderLeft: "2px solid #263a54" }}>
                        {s.era >= 2 ? (
                          <>
                            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#93a3ba", marginBottom: 4 }}>
                              <span>{t("detectiveLabel")}</span>
                              <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: "#c9a227" }}>{s.detectiveShare}%</span>
                            </div>
                            <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                              <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setDetectiveShare(s.detectiveShare - 10)} disabled={!!s.gameOver || s.detectiveShare <= 0}>−10</button>
                              <div style={{ flex: 1, height: 8, background: "#1c3049", borderRadius: 4, overflow: "hidden" }}>
                                <div style={{ width: `${s.detectiveShare}%`, height: "100%", background: "linear-gradient(90deg,#a3822a,#c9a227)" }} />
                              </div>
                              <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setDetectiveShare(s.detectiveShare + 10)} disabled={!!s.gameOver || s.detectiveShare >= 100}>+10</button>
                              <InfoButton title={t("detectiveInfoTitle")} text={t("detectiveInfoText")} />
                            </div>
                          </>
                        ) : (
                          <div style={{ fontSize: 10.5, color: "#93a3ba" }}>{t("adminLockedEarly")}</div>
                        )}
                      </div>
                    )}

                    {key === "industry" && (
                      <div style={{ marginTop: 6, paddingLeft: 4, borderLeft: "2px solid #263a54" }}>
                        {s.era >= 1 ? (
                          <>
                            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#93a3ba", marginBottom: 4 }}>
                              <span>{t("industryLabel")}</span>
                              <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: "#c9a227" }}>{s.industryFocus}%</span>
                            </div>
                            <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                              <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setIndustryFocus(s.industryFocus - 10)} disabled={!!s.gameOver || s.industryFocus <= 0}>−10</button>
                              <div style={{ flex: 1, height: 8, background: "#1c3049", borderRadius: 4, overflow: "hidden" }}>
                                <div style={{ width: `${s.industryFocus}%`, height: "100%", background: "linear-gradient(90deg,#a3822a,#c9a227)" }} />
                              </div>
                              <button className="step" style={{ minWidth: 34, height: 32, fontSize: 13 }} onClick={() => setIndustryFocus(s.industryFocus + 10)} disabled={!!s.gameOver || s.industryFocus >= 100}>+10</button>
                              <InfoButton title={t("industryInfoTitle")} text={t("industryInfoText")} />
                            </div>
                          </>
                        ) : (
                          <div style={{ fontSize: 10.5, color: "#93a3ba" }}>{t("industryLockedEarly")}</div>
                        )}
                      </div>
                    )}
                  </div>
                  ));
                })()}
                <div style={{ fontSize: 12, color: "#93a3ba" }}>
                  {t("workforceRules")} <InfoButton title={t("workforceRules")} text={t("workforceRulesText")} />
                </div>
              </Section>

              <Section title={t("professionsTitle")} open={profOpen} onToggle={() => setProfOpen(!profOpen)}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
                  <tbody>
                    {professions.map((p) => (
                      <tr key={p.name} style={{ borderBottom: "1px dotted #263a54" }}>
                        <td style={{ padding: "6px 4px", color: "#cfd6de" }}>{p.name}<div style={{ fontSize: 11, color: "#93a3ba" }}>{p.note}</div></td>
                        <td style={{ textAlign: "right", fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: "#e9e2cf" }}>{fmt(p.n)}</td>
                      </tr>
                    ))}
                    <tr><td style={{ padding: "6px 4px", color: "#93a3ba" }}>{t("outsideWorkforce")}</td>
                      <td style={{ textAlign: "right", fontFamily: "'IBM Plex Mono',monospace", color: "#93a3ba" }}>{fmt(s.children + s.elderly)}</td></tr>
                  </tbody>
                </table>
                <div style={{ marginTop: 10, fontSize: 13, color: "#93a3ba" }}>
                  {t("eraBackground")} <InfoButton title={TE(lang, s.era, "name", era.name)} text={`${TE(lang, s.era, "desc", era.desc)} ${TE(lang, s.era, "hist", era.hist)}`} />
                </div>
              </Section>
            </div>

            <div style={{ textAlign: "center", margin: "18px 0" }}>
              <button className="btn" style={{ width: "100%", maxWidth: 420 }} onClick={nextTurn} disabled={!!s.gameOver}>{t("nextTurnBtn")}</button>
            </div>

            {infoModal && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(6,12,22,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 25, padding: 12 }} onClick={() => setInfoModal(null)}>
                <div className="modal-panel" style={{ maxWidth: 460, width: "100%", maxHeight: "80vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, margin: "0 0 8px", color: "#f0e8d2" }}>ℹ️ {infoModal.title}</h2>
                    <button onClick={() => setInfoModal(null)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#93a3ba", lineHeight: 1 }}>✕</button>
                  </div>
                  <p style={{ fontSize: 14, lineHeight: 1.6, margin: 0, color: "#cfd6de" }}>{infoModal.text}</p>
                </div>
              </div>
            )}

            <div className="grid-graphlog">
              <div className="paper" style={{ padding: 10 }}>
                <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 14, margin: "0 0 4px", color: "#f0e8d2" }}>{t("populationChartTitle")}</h2>
                <ResponsiveContainer width="100%" height={90}>
                  <LineChart data={s.history} margin={{ top: 5, right: 6, bottom: 0, left: 0 }}>
                    <CartesianGrid stroke="#263a54" strokeDasharray="3 3" />
                    <XAxis dataKey="year" stroke="#93a3ba" fontSize={10} />
                    <YAxis stroke="#93a3ba" fontSize={10} tickFormatter={(v) => (v >= 1000 ? v / 1000 + "k" : v)} width={32} />
                    <Tooltip formatter={(v) => [fmt(v), t("statPop")]} labelFormatter={t("yearAxisLabel")} contentStyle={{ background: "#0d1c30", border: "1px solid #2a3d57", fontFamily: "'IBM Plex Mono',monospace", fontSize: 12, color: "#e9e2cf" }} />
                    <Line type="monotone" dataKey="pop" stroke="#c9a227" strokeWidth={2} dot={false} />
                  </LineChart>
                </ResponsiveContainer>
              </div>

              <div className="paper" style={{ padding: 10 }}>
                <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 14, margin: "0 0 4px", color: "#f0e8d2" }}>{t("logTitle")}</h2>
                <div style={{ maxHeight: 110, overflowY: "auto" }}>
                  {s.log.map((l, i) => (
                    <div key={i} style={{ padding: "3px 6px", fontSize: 12.5, borderLeft: `3px solid ${l.tone === "bad" ? "#c96a5a" : l.tone === "good" ? "#7fbf8f" : "#93a3ba"}`, marginBottom: 3, background: "rgba(255,255,255,0.03)", color: "#cfd6de" }}>
                      <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 11, color: "#93a3ba", marginRight: 6 }}>v.{l.year}</span>{l.text}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </>
        )}

        {s.gameOver && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(6,12,22,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 10, padding: 12 }}>
            <div className="modal-panel" style={{ maxWidth: 480, width: "100%", textAlign: "center", padding: 24, maxHeight: "90vh", overflowY: "auto" }}>
              <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 28, margin: "0 0 10px", color: s.gameOver.win ? "#7fbf8f" : "#c96a5a" }}>
                {s.gameOver.win ? t("civilizationWins") : t("civilizationCollapsed")}
              </h2>
              <p style={{ fontSize: 16, margin: "0 0 8px", color: "#cfd6de" }}>{s.gameOver.text}</p>

              <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 40, fontWeight: 700, color: "#c9a227", margin: "6px 0 2px" }}>{fmt(score.total)}</div>
              <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1.5, color: "#93a3ba", marginBottom: 8 }}>{t("civIndexLabel")}</div>
              <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse", marginBottom: 12 }}>
                <tbody>
                  {Object.entries(score.parts).map(([k, v]) => (
                    <tr key={k} style={{ borderBottom: "1px dotted #263a54" }}>
                      <td style={{ textAlign: "left", padding: "3px 4px", color: "#cfd6de" }}>{t(k)}</td>
                      <td style={{ textAlign: "right", fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: "#e9e2cf" }}>{fmt(v)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>

              {window.storage && (
                <div style={{ background: "#12233a", border: "1px solid #2a3d57", borderRadius: 8, padding: 12, marginBottom: 12 }}>
                  <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 17, fontWeight: 700, marginBottom: 8, color: "#f0e8d2" }}>{t("leaderboardTitle")}</div>
                  {!scoreSaved ? (
                    <div style={{ display: "flex", gap: 8 }}>
                      <input value={playerName} onChange={(e) => setPlayerName(e.target.value)} placeholder={t("leaderboardNamePlaceholder")} maxLength={20}
                        style={{ flex: 1, padding: "10px 12px", fontSize: 15, fontFamily: "'Source Sans 3',sans-serif", color: "#e9e2cf", border: "1.5px solid #c9a22766", borderRadius: 8, background: "#0d1c30", minWidth: 0 }} />
                      <button className="btn" style={{ padding: "10px 16px", fontSize: 15 }} onClick={submitScore} disabled={!playerName.trim()}>{t("saveBtn")}</button>
                    </div>
                  ) : (
                    <div style={{ color: "#7fbf8f", fontSize: 14, fontWeight: 600 }}>{t("scoreSaved")}</div>
                  )}
                  <div style={{ fontSize: 11, color: "#93a3ba", marginTop: 6 }}>{t("leaderboardVisibility")}</div>
                  {board && board.length > 0 && (
                    <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse", marginTop: 10 }}>
                      <tbody>
                        {board.slice(0, 10).map((r, i) => (
                          <tr key={i} style={{ borderBottom: "1px dotted #263a54", background: scoreSaved && r.name === playerName.trim() && r.score === score.total ? "rgba(201,162,39,0.12)" : "transparent" }}>
                            <td style={{ textAlign: "left", padding: "3px 4px", fontFamily: "'IBM Plex Mono',monospace", color: "#93a3ba" }}>{i + 1}.</td>
                            <td style={{ textAlign: "left", padding: "3px 4px", color: "#cfd6de" }}>{r.icon} {r.name} <span style={{ color: "#93a3ba", fontSize: 11 }}>({r.civ}{r.win ? ` ${t("leaderboardWin")}` : ""})</span></td>
                            <td style={{ textAlign: "right", fontFamily: "'IBM Plex Mono',monospace", fontWeight: 600, color: "#e9e2cf" }}>{fmt(r.score)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                  {board && board.length === 0 && <div style={{ fontSize: 13, color: "#93a3ba", marginTop: 8 }}>{t("leaderboardEmpty")}</div>}
                </div>
              )}

              <p style={{ fontSize: 13, color: "#93a3ba", margin: "0 0 10px" }}>{t("peakPopLine")(fmt(Math.max(...s.history.map((h) => h.pop))), s.year)}</p>
              <button className="btn" onClick={() => { setS(makeStart(null, "", [], s.lang)); setScoreSaved(false); setBoard(null); setPendingCiv(null); setChosenSkills([]); setVillageNameInput(""); }}>{t("restartBtn")}</button>
            </div>
          </div>
        )}

        <footer style={{ textAlign: "center", fontSize: 12, color: "#93a3ba", margin: "20px 0 8px" }}>
          {t("footerNote")}
        </footer>
      </div>
    </div>
  );
}



const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(Yhteiskunta));
</script>
</body>
</html>
