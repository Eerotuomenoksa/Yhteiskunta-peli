name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Tarkista JSX/JS-syntaksi (CDN-fallback + jsx)
        run: node tools/check-syntax.js
      - name: Tarkista data/tietolaatikot.mjs on ajan tasalla
        run: node tools/check-data-sync.js

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Vite-build (game/ -> dist/)
        run: npm run build
